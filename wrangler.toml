# Bu proje @cloudflare/next-on-pages çıktısı kullanır (.vercel/output/static).
# Workers Builds varsayılanı `npx wrangler deploy`; aşağıdaki main + assets bu
# komutun çıktıyı yayınlaması için yeterli (ÖNCE mutlaka `npm run pages:build`).
# İsterseniz yine `wrangler pages deploy` da kullanılabilir (bkz. package.json).

name = "siteyonetim"
compatibility_date = "2024-05-24"
compatibility_flags = ["nodejs_compat"]

# Next-on-pages Cloudflare adapter
main = ".vercel/output/static/_worker.js"

[assets]
directory = ".vercel/output/static"

[[d1_databases]]
binding = "DB"
database_name = "siteyonetim-db"
database_id = "c8b48f81-826f-4e7e-a1f9-580afa5321b5"
migrations_dir = "drizzle"  # yalnızca full-schema.sql (tek şema dosyası)

# Teşhis (/api/setup/status): panodaki UUID ile aynı (bağlantı hâlâ [[d1_databases]] üzerinden env.DB)
[vars]
D1_DATABASE_ID = "c8b48f81-826f-4e7e-a1f9-580afa5321b5"
D1_DATABASE_NAME = "siteyonetim-db"
