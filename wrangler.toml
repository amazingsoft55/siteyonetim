# Bu proje Cloudflare Pages (Next‑on‑Pages) çıktısı kullanır.
# CI build: npm run pages:build (içerde `vercel build` çağırır; `npm run build` SADECE `next build` olmalı).
# Yayın (DEPLOY komutu Dashboard’da): npm run deploy:cf
#   veya doğrudan: npx wrangler pages deploy .vercel/output/static --project-name=siteyonetim
# `npx wrangler deploy` kullanmayın — eski Workers Sites modu `workers-site/index.js` ister ve bu repoda yoktur.

name = "siteyonetim"
compatibility_date = "2024-05-24"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "siteyonetim-db"
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"
